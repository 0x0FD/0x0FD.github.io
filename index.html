<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Infinite Libraries powered by random apis"
    />
    <meta property="og:title" content="Random Image Libraries" />
    <meta property="og:description" content="Scroll infinite  photos" />
    <meta property="og:image" content="https://cataas.com/cat" />
    <meta property="og:type" content="website" />
    <title>Infinite Libraries</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, Arial, sans-serif;
        background: radial-gradient(circle at top, #1b1b1b, #0d0d0d);
        color: white;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 18px;
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(20, 20, 20, 0.6);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      header h3 {
        margin: 0;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      span {
        margin: 0;
        font-weight: 300;
        font-size: 10px;
        letter-spacing: 0.1px;
      }
      button {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 8px 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
      }
      .divification {
        margin-top: 20px;
        align-items: center;
        justify-self: center;
        justify-items: center;
        max-width: 600px;
        min-width: 200px;

        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 8px 12px;
        border-radius: 10px;
        transition: 0.2s;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateY(-1px);
      }
      #favoritesPanel {
        position: fixed;
        right: 10px;
        top: 70px;
        width: 320px;
        height: calc(100% - 80px);
        background: rgba(25, 25, 25, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        overflow-y: auto;
        padding: 12px;
        display: none;
      }
      #favoritesPanel img {
        width: 100%;
        border-radius: 12px;
        margin-bottom: 10px;
      }
      #favoritesPanel button {
        width: 100%;
        margin-bottom: 12px;
      }
      
    </style>
  </head>
  <body>
    <div id="favoritesPanel"></div>
    <header>
      <h3>Infinite Libraries <span class="smaller">by 0x0FD</span></h3>
      <div>
        <button onclick="toggleFavorites()">Favorites</button>
        <button onclick="clearFavorites()">Clear</button>
      </div>
      
    </header>
    <div class="divification">
      <button onclick="open('cat')">Cat Library</button>
      <button onclick="open('lorem')">Lorem Picsum Library</button>
      <button onclick="open('fox')">Fox Library</button>
      <button onclick="open('dog')">Dog Library</button>
      <button onclick="open('frog')">Frog Library</button>
    </div>
    <script>
//borign
function open(url) {
  window.open(`https://0x0FD.github.io/${url}`, "");
}
const grid = document.getElementById("grid");
const favPanel = document.getElementById("favoritesPanel");
let buffer = [];
const BUFFER_SIZE = 150;
let favorites = JSON.parse(localStorage.getItem("cats_fav") || "[]");
function saveFavs() {
  localStorage.setItem("cats_fav", JSON.stringify(favorites));
}
function isFav(url) {
  return favorites.includes(url);
}
function renderFavorites() {
  favPanel.innerHTML = "";
  favorites.forEach((url) => {
    const wrapper = document.createElement("div");
    const img = document.createElement("img");
    img.src = url;
    const removeBtn = document.createElement("button");
    removeBtn.innerText = "Remove";
    removeBtn.onclick = () => {
      favorites = favorites.filter((c) => c !== url);
      saveFavs();
      renderFavorites();
    };
    wrapper.appendChild(img);
    wrapper.appendChild(removeBtn);
    favPanel.appendChild(wrapper);
  });
}
function toggleFavorites() {
  if (favPanel.style.display === "block") {
    favPanel.style.display = "none";
  } else {
    renderFavorites();
    favPanel.style.display = "block";
  }
}
function clearFavorites() {
  favorites = [];
  saveFavs();
  favPanel.innerHTML = "";
}
    </script>
  </body>
</html>
