

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Infinite Dog Library">
    <meta property="og:title" content="Dog Library">
    <meta property="og:description" content="Scroll infinite silly dogs">
    <meta property="og:image" content="https://picsum.photos/300/200">
    <meta property="og:type" content="website">
    <title>Dog Library</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, Arial, sans-serif;
        background: radial-gradient(circle at top, #1b1b1b, #0d0d0d);
        color: white;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 18px;
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(20, 20, 20, 0.6);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      header h3 {
        margin: 0;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      span {
        margin: 0;
        font-weight: 300;
        font-size: 10px;
        letter-spacing: 0.1px;
      }
      button {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 8px 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateY(-1px);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
        padding: 14px;
      }
      .card {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        background: #151515;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .card:hover {
        transform: scale(1.02);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
      }
      .dog {
        width: 100%;
        height: 220px;
        object-fit: cover;
        display: block;
        transition: transform 0.3s ease;
      }
      .card:hover .dog {
        transform: scale(1.05);
      }
      .actions {
        position: absolute;
        bottom: 10px;
        right: 10px;
        display: flex;
        gap: 6px;
      }
      .icon-btn {
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 6px 8px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 12px;
        backdrop-filter: blur(6px);
        transition: 0.2s;
      }
      .icon-btn:hover {
        transform: scale(1.1);
        background: rgba(0, 0, 0, 0.75);
      }
      #favoritesPanel {
        position: fixed;
        right: 10px;
        top: 70px;
        width: 320px;
        height: calc(100% - 80px);
        background: rgba(25, 25, 25, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        overflow-y: auto;
        padding: 12px;
        display: none;
      }
      #favoritesPanel img {
        width: 100%;
        border-radius: 12px;
        margin-bottom: 10px;
      }
      #favoritesPanel button {
        width: 100%;
        margin-bottom: 12px;
      }
      @keyframes pulse {
        0% { opacity: 0.4; }
        50% { opacity: 0.7; }
        100% { opacity: 0.4; }
      }
    </style>
  </head>
  <body>
    <header>
      <h3>Dog Library <span class="smaller">by 0x0FD</span></h3>
      <div>
        <button onclick="toggleFavorites()">Favorites</button>
        <button onclick="clearFavorites()">Clear</button>
      </div>
    </header>
    <div class="grid" id="grid"></div>
    <div id="favoritesPanel"></div>
<script>
const grid = document.getElementById("grid");
const favPanel = document.getElementById("favoritesPanel");

let buffer = [];
const BUFFER_SIZE = 5;

let favorites = JSON.parse(localStorage.getItem("dogs_fav") || "[]");

function saveFavs() {
  localStorage.setItem("dogs_fav", JSON.stringify(favorites));
}

function isFav(url) {
  return favorites.includes(url);
}

function renderFavorites() {
  favPanel.innerHTML = "";

  favorites.forEach((url) => {
    const wrapper = document.createElement("div");

    const img = document.createElement("img");
    img.src = url;

    const removeBtn = document.createElement("button");
    removeBtn.innerText = "Remove";
    removeBtn.onclick = () => {
      favorites = favorites.filter((c) => c !== url);
      saveFavs();
      renderFavorites();
    };

    wrapper.appendChild(img);
    wrapper.appendChild(removeBtn);
    favPanel.appendChild(wrapper);
  });
}

async function createdog() {
  const res = await fetch("https://dog.ceo/api/breeds/image/random");
  const data = await res.json();

  const url = data.message;

  const card = document.createElement("div");
  card.className = "card";

  const img = document.createElement("img");
  img.src = url;
  img.className = "dog";

  const actions = document.createElement("div");
  actions.className = "actions";

  const favBtn = document.createElement("button");
  favBtn.className = "icon-btn";
  favBtn.innerText = isFav(url) ? "💔" : "🧡";

  favBtn.onclick = () => {
    if (isFav(url)) {
      favorites = favorites.filter((c) => c !== url);
      favBtn.innerText = "🧡";
    } else {
      favorites.push(url);
      favBtn.innerText = "💔";
    }
    saveFavs();
    renderFavorites();
  };


  const dlBtn = document.createElement("button");
  dlBtn.className = "icon-btn";
  dlBtn.innerText = "⬇";

  dlBtn.onclick = async () => {
    const res = await fetch(url);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = "dog.jpg";
    a.click();

    URL.revokeObjectURL(blobUrl);
  };

  actions.appendChild(favBtn);
  actions.appendChild(dlBtn);

  card.appendChild(img);
  card.appendChild(actions);

  return card;
}

async function fillBuffer() {
  const needed = BUFFER_SIZE - buffer.length;

  const promises = Array.from({ length: needed }, () => createdog());
  const cards = await Promise.all(promises);

  buffer.push(...cards);
}


async function showdogs(count = 8) {
  for (let i = 0; i < count; i++) {
    if (buffer.length === 0) await fillBuffer();

    const card = buffer.shift();
    if (card) grid.appendChild(card);
  }


  fillBuffer();
}

function toggleFavorites() {
  if (favPanel.style.display === "block") {
    favPanel.style.display = "none";
  } else {
    renderFavorites();
    favPanel.style.display = "block";
  }
}

function clearFavorites() {
  favorites = [];
  saveFavs();
  favPanel.innerHTML = "";
}
function showSkeletons(count) {
  grid.innerHTML = "";

  for (let i = 0; i < count; i++) {
    const div = document.createElement("div");
    div.className = "card";
    div.style.height = "220px";
    div.style.background = "#222";
    div.style.animation = "pulse 1.2s infinite";
    grid.appendChild(div);
  }
}
(async () => {
  showSkeletons(35);
  await fillBuffer();
  grid.innerHTML = "";
  await showdogs(35);
})();

let loading = false;

window.addEventListener("scroll", async () => {
  if (
    loading ||
    window.scrollY + window.innerHeight <
      document.body.offsetHeight - 200
  ) return;

  loading = true;
  await showdogs(12);
  loading = false;
});
</script>
  </body>
</html>
