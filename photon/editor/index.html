<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Roblox Lua Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #221f1f; font-family: sans-serif; }
    #editor { width: 100vw; height: calc(100vh - 37px); }
  </style>
</head>
<body>
  <div id="editor"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/loader.min.js"></script>
  <script>
    require.config({
      paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs' }
    });
    require(['vs/editor/editor.main'], function () {
      // ── 1. REGISTER LANGUAGE ─────────────────────────────────
      monaco.languages.register({ id: 'roblox-lua' });
      // ── 2. TOKENIZER ─────────────────────────────────────────
      monaco.languages.setMonarchTokensProvider('roblox-lua', {
        keywords: [
          'and', 'break', 'do', 'else', 'elseif', 'end',
          'false', 'for', 'function', 'if', 'in',
          'local', 'nil', 'not', 'or', 'repeat',
          'return', 'then', 'true', 'until', 'while',
          'continue'
        ],

        robloxGlobals: [
          'game', 'workspace', 'script', 'plugin',
          'Enum', 'Instance', 'Vector3', 'Vector2',
          'CFrame', 'Color3', 'BrickColor', 'UDim', 'UDim2',
          'TweenInfo', 'Ray', 'Region3', 'Rect',
          'math', 'table', 'string', 'os', 'task',
          'print', 'warn', 'error', 'assert', 'pcall', 'xpcall',
          'require', 'wait', 'spawn', 'delay', 'tick',
          'typeof', 'type', 'tostring', 'tonumber',
          'pairs', 'ipairs', 'next', 'select', 'unpack',
          'setmetatable', 'getmetatable', 'rawset', 'rawget',
          'coroutine', 'bit32', "loadstring", "printidentity"
        ],

        services: [
          'Players', 'ReplicatedStorage', 'ServerStorage',
          'ServerScriptService', 'StarterGui', 'StarterPack',
          'StarterPlayerScripts', 'Lighting', 'SoundService',
          'TweenService', 'RunService', 'UserInputService',
          'HttpService', 'DataStoreService', 'CollectionService',
          'PathfindingService', 'PhysicsService', 'MarketplaceService',
          'ChatService', 'Teams', 'BadgeService',
        ],
        tokenizer: {
          root: [
            // Long strings [[ ]]
            [/\[(=*)\[/, { token: 'string.longstart', next: '@longstring.$1' }],
            // Long comments --[[ ]]
            [/--\[(=*)\[/, { token: 'comment', next: '@longcomment.$1' }],
            // Single-line comment
            [/--.*$/, 'comment'],
            // Keywords / globals / identifiers
            [/[a-zA-Z_]\w*/, {
              cases: {
                '@keywords':      'keyword',
                '@robloxGlobals': 'type.identifier',
                '@services':      'variable.name',
                '@default':       'identifier'
              }
            }],
            // Whitespace
            { include: '@whitespace' },
            // Numbers (hex, float, int)
            [/0x[0-9a-fA-F]+/, 'number.hex'],
            [/\d+(\.\d+)?([eE][-+]?\d+)?/, 'number'],
            // Strings
            [/"([^"\\]|\\.)*$/, 'string.invalid'],
            [/'([^'\\]|\\.)*$/, 'string.invalid'],
            [/"/,  'string', '@string_double'],
            [/'/,  'string', '@string_single'],
            // Operators
            [/[+\-*\/%^#&|~<>=]+/, 'operator'],
            [/\.\./, 'operator'],        // concatenation
            [/\.\.\./, 'operator'],      // vararg
            // Brackets
            [/[{}()\[\]]/, '@brackets'],
            // Delimiter
            [/[;,.]/, 'delimiter'],
          ],
          string_double: [
            [/[^\\"]+/, 'string'],
            [/\\./, 'string.escape'],
            [/"/, 'string', '@pop'],
          ],
          string_single: [
            [/[^\\']+/, 'string'],
            [/\\./, 'string.escape'],
            [/'/, 'string', '@pop'],
          ],
          longstring: [
            [/\](=*)\]/, {
              cases: {
                '$1==$S2': { token: 'string.longend', next: '@pop' },
                '@default': 'string'
              }
            }],
            [/./, 'string'],
          ],
          longcomment: [
            [/\](=*)\]/, {
              cases: {
                '$1==$S2': { token: 'comment', next: '@pop' },
                '@default': 'comment'
              }
            }],
            [/./, 'comment'],
          ],
          whitespace: [
            [/[ \t\r\n]+/, 'white'],
          ],
        }
      });
      // ── 3. ROBLOX STUDIO-LIKE THEME ──────────────────────────
      monaco.editor.defineTheme('roblox-dark', {
        base: 'vs-dark',
        inherit: true,
        rules: [
          { token: 'keyword',         foreground: 'F92672', fontStyle: 'bold' },
          { token: 'type.identifier', foreground: '66D9EF' },  // globals (game, workspace...)
          { token: 'variable.name',   foreground: 'A6E22E' },  // services
          { token: 'identifier',      foreground: 'F8F8F2' },
          { token: 'number',          foreground: 'AE81FF' },
          { token: 'number.hex',      foreground: 'AE81FF' },
          { token: 'string',          foreground: 'E6DB74' },
          { token: 'string.escape',   foreground: 'AE81FF' },
          { token: 'comment',         foreground: '75715E', fontStyle: 'italic' },
          { token: 'operator',        foreground: 'F92672' },
          { token: 'delimiter',       foreground: 'F8F8F2' },
        ],
        colors: {
          'editor.background':          '#060608',
          'editor.foreground':          '#fcf232',
          'editorLineNumber.foreground':'#3e3a3a',
          'editor.selectionBackground': '#202022',
          'editor.lineHighlightBackground': '#282424',
          'editorCursor.foreground':    '#FFFC6B',
        }
      });
      // ── 4. AUTOCOMPLETE ───────────────────────────────────────
      monaco.languages.registerCompletionItemProvider('roblox-lua', {
        provideCompletionItems: (model, position) => {
          const range = {
            startLineNumber: position.lineNumber,
            endLineNumber: position.lineNumber,
            startColumn: model.getWordUntilPosition(position).startColumn,
            endColumn: position.column,
          };
          const suggestions = [
            // ── Snippets ────────────────────────────────────────
            {
              label: 'function',
              kind: monaco.languages.CompletionItemKind.Snippet,
              insertText: 'function ${1:name}(${2:args})\n\t$0\nend',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Define a function', range
            },
            {
              label: 'local function',
              kind: monaco.languages.CompletionItemKind.Snippet,
              insertText: 'local function ${1:name}(${2:args})\n\t$0\nend',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Define a local function', range
            },
            {
              label: 'if',
              kind: monaco.languages.CompletionItemKind.Snippet,
              insertText: 'if ${1:condition} then\n\t$0\nend',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'If statement', range
            },
            {
              label: 'if-else',
              kind: monaco.languages.CompletionItemKind.Snippet,
              insertText: 'if ${1:condition} then\n\t$0\nelse\n\t\nend',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'If-else statement', range
            },
            {
              label: 'for',
              kind: monaco.languages.CompletionItemKind.Snippet,
              insertText: 'for ${1:i} = ${2:1}, ${3:10} do\n\t$0\nend',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Numeric for loop', range
            },
            {
              label: 'for-pairs',
              kind: monaco.languages.CompletionItemKind.Snippet,
              insertText: 'for ${1:key}, ${2:value} in pairs(${3:table}) do\n\t$0\nend',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Generic for loop with pairs', range
            },
            {
              label: 'while',
              kind: monaco.languages.CompletionItemKind.Snippet,
              insertText: 'while ${1:condition} do\n\t$0\nend',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'While loop', range
            },
            {
              label: 'pcall',
              kind: monaco.languages.CompletionItemKind.Snippet,
              insertText: 'local success, result = pcall(function()\n\t$0\nend)',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Protected call', range
            },
            // ── Roblox-specific snippets ─────────────────────────
            {
              label: 'GetService',
              kind: monaco.languages.CompletionItemKind.Snippet,
              insertText: 'local ${1:Players} = game:GetService("${1:Players}")',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Get a Roblox service', range
            },
            {
              label: 'RemoteEvent',
              kind: monaco.languages.CompletionItemKind.Snippet,
              insertText: 'local ${1:RemoteEvent} = game.ReplicatedStorage:WaitForChild("${1:RemoteEvent}")',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Get a RemoteEvent', range
            },
            {
              label: 'task.wait',
              kind: monaco.languages.CompletionItemKind.Function,
              insertText: 'task.wait(${1:1})',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Wait N seconds (preferred over wait())', range
            },
            {
              label: 'task.spawn',
              kind: monaco.languages.CompletionItemKind.Function,
              insertText: 'task.spawn(function()\n\t$0\nend)',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Spawn a new thread', range
            },
            {
              label: 'Vector3.new',
              kind: monaco.languages.CompletionItemKind.Constructor,
              insertText: 'Vector3.new(${1:0}, ${2:0}, ${3:0})',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Create a new Vector3', range
            },
            {
              label: 'CFrame.new',
              kind: monaco.languages.CompletionItemKind.Constructor,
              insertText: 'CFrame.new(${1:0}, ${2:0}, ${3:0})',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Create a new CFrame', range
            },
            {
              label: 'Color3.fromRGB',
              kind: monaco.languages.CompletionItemKind.Constructor,
              insertText: 'Color3.fromRGB(${1:255}, ${2:255}, ${3:255})',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Create a Color3 from RGB values', range
            },
            {
              label: 'Instance.new',
              kind: monaco.languages.CompletionItemKind.Constructor,
              insertText: 'Instance.new("${1:Part}")',
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Create a new Instance', range
            },
            {
              label: 'TweenService',
              kind: monaco.languages.CompletionItemKind.Snippet,
              insertText: [
                'local TweenService = game:GetService("TweenService")',
                'local tween = TweenService:Create(${1:instance}, TweenInfo.new(${2:1}), {${3:}})',
                'tween:Play()'
              ].join('\n'),
              insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
              documentation: 'Create and play a tween', range
            },
          ];
          return { suggestions };
        }
      });
      monaco.editor.create(document.getElementById('editor'), {
        value: `-- Photon executor V1.2
print("Hello, World!!")
printidentity()
`,
        language: 'roblox-lua',
        theme: 'roblox-dark',
        fontSize: 14,
        fontFamily: '"Fira Code", "Cascadia Code", monospace',
        fontLigatures: true,
        minimap: { enabled: true },
        automaticLayout: true,
        lineNumbers: 'on',
        scrollBeyondLastLine: false,
        tabSize: 4,
      });
    });
  </script>
</body>
</html>
